<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #111d13;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

            .container{
            width:100%;
            max-width:1000px;
            min-height:600px;
            display:flex;
            overflow:hidden;
            border-radius:25px;
            background-image: url(nokia.jpeg);
            background-size:cover;
            background-position:center;
            background-position: -200px;
            box-shadow:0 15px 35px rgba(0,0,0,.5);
        }
        .banner{
            flex:1;
            background:
            linear-gradient(rgba(17,29,19,.5),rgba(17,29,19,.5)),
            url("background.jpg");
            background-size:cover;
            background-position:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:40px;
            text-align:center;
        }

        .banner h2{
            font-size:45px;
            color:gold;
        }

        .banner p{
            margin-top:20px;
            color:white;
            font-size:18px;
        }

        .login {
            flex:1;
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:45px;
            background:#182416;
        }

        .foto-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            border: 5px solid gold;
            overflow: hidden;
            background-image: url(pp.jpeg);
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            color: gold;
            font-size: 26px;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-align: center;
        }

        p {
            font-size: 14px;
            color: #a5b5a2;
            margin-bottom: 25px;
            text-align: center;
        }

        p a {
            color: gold;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        p a:hover {
            text-decoration: underline;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            color: #d1dfcd;
            margin-bottom: 8px;
            margin-top: 15px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border-radius: 25px;
            border: 2px solid gold;
            background: transparent;
            color: white;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            background: rgba(255, 255, 255, 0.03);
        }

        .password-field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-field input {
            padding-right: 45px;
        }

        .password-field i {
            position: absolute;
            right: 18px;
            cursor: pointer;
            color: #a5b5a2;
            font-size: 16px;
            transition: color 0.3s;
        }

        .password-field i:hover {
            color: gold;
        }

        .opsi {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .opsi label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: pointer;
            color: #a5b5a2;
        }

        .opsi input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: gold;
            cursor: pointer;
        }

        .opsi a {
            color: gold;
            text-decoration: none;
            transition: 0.2s;
        }

        .opsi a:hover {
            text-decoration: underline;
        }

        .submit {
            width: 100%;
            margin-top: 25px;
            height: 48px;
            border: none;
            border-radius: 25px;
            background: gold;
            color: #111d13;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .submit:hover {
            background: #ffea75;
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .sosial {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .sosial a {
            width: 38px;
            height: 38px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.4);
            color: gold;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .sosial a:hover {
            background: gold;
            color: #111d13;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        @media (max-width:768px){

            .container{
                flex-direction:column;
                max-width:380px;
                min-height:auto;
            }

            .banner{
                height:220px;
            }

            .login{
                padding:30px;
            }

        }
    </style>
</head>
<body>
    <div class="container">

        <div class="banner">
            <h2>Yaho  !</h2>
            <p>kembali bergabung bersama</p>
        </div>
        <div class="login">
            <div class="foto-container">
                <div class="profil"></div>
            </div>

            <h1>WELCOME BACK!</h1>
            <p>
                Don't have an account? 
                <a href="#">Sign Up</a>
            </p>

            <form onsubmit="return false;">
                <label>Username</label>
                <input 
                    id="username"
                    name="username"
                    type="text" 
                    placeholder="example@gmail.com" 
                    required>

                <label>Password</label>
                <div class="password-field">
                    <input 
                        id="password"
                        name="paswd"
                        type="password" 
                        placeholder="********" 
                        required>
                    <i class="fa-solid fa-eye" id="togglePasswordBtn"></i>
                </div>

                <div class="opsi">
                    <label>
                        <input type="checkbox" required>
                        Remember Me
                    </label>
                    <a href="#">Forgot?</a>
                </div>

                <input type="submit" value="Sign In" id="Login" class="submit">
            </form>
            
            <div id="status" style="color: #ff6b6b; font-weight: bold; margin-top: 15px; font-size: 14px;"></div>

            <div class="sosial">
                <a href="#" title="Twitter"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" title="Youtube"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" title="Discord"><i class="fa-brands fa-discord"></i></a>
            </div>
        </div>
    </div>

    <script>
        $("#Login").on("click", function( event ) {
            var u = $("#username").val();
            // PERBAIKAN: Mengambil value berdasarkan id="password" yang benar
            var p = $("#password").val(); 
            
            // PERBAIKAN: Mengubah port menjadi 5050 agar mengarah ke webserver Python Anda
            $.post("proses_login.rpc", {
                username: u, 
                paswd: p
            }).done(function(data){
                var hasil = data.trim(); 

                if (hasil === "sukses") {
                    window.location.href = "profil.html";
                } else {
                    $("#status").html("Login Gagal! Silahkan coba lagi...");
                    
                    setTimeout(function(){
                        // Mengosongkan status dan form kembali
                        $("#status").html("");
                        $("#username").val("");
                        $("#password").val("");
                    }, 2000);
                }
            }).fail(function() {
                $("#status").html("Error: Tidak dapat terhubung ke Server!");
            });
        });

        // Fitur Tambahan: Fungsi toggle mata password agar berfungsi interaktif
        $("#togglePasswordBtn").on("click", function() {
            var passInput = $("#password");
            if (passInput.attr("type") === "password") {
                passInput.attr("type", "text");
                $(this).removeClass("fa-eye").addClass("fa-eye-slash");
            } else {
                passInput.attr("type", "password");
                $(this).removeClass("fa-eye-slash").addClass("fa-eye");
            }
        });
    </script>
</body>
</html>
